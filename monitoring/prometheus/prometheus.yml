global:
  scrape_interval: 15s
scrape_configs:
  - job_name: "cloud-observability-platform"
    static_configs:
      - targets:
          - app:8000
  - job_name: "nod-exporter"
    static_configs:
      - targets:
        - node-exporter:9100

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml