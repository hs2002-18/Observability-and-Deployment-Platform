kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: cop-hpa
  namespace: cop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cop-deployment

  minReplicas: 2
  maxReplicas: 3

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5