apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cloud-observability-platform.fullname" . }}
  namespace: cop
  labels:
    {{- include "cloud-observability-platform.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "cloud-observability-platform.fullname" . }}
                port:
                  number: {{ .Values.service.port }}